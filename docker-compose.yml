version: '3.8'

services:
  backend:
    build: ./backend
    container_name: admin-backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - JWT_SECRET=your-secret-key-change-in-production
    networks:
      - admin-network

  frontend:
    build: ./frontend
    container_name: admin-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - admin-network

networks:
  admin-network:
    driver: bridge